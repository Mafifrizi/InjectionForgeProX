name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile check
        run: python -m compileall -q .

      - name: Unit tests
        run: pytest -q

      - name: Build wheel
        run: python -m pip wheel . --no-deps -w dist

      - name: Installed-wheel smoke test
        run: |
          pip install --no-deps dist/*.whl
          cd /tmp
          injectionforge --version
          injectionforge --validate --light --offline --analysis-mode balanced

      - name: Analyzer validation
        run: python forge_x.py --validate --light --offline --analysis-mode balanced

      - name: Benchmark strict mode
        run: python evaluate.py --analysis-mode strict
